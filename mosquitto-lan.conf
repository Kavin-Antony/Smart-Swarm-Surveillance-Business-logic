# Mosquitto config for Smart Swarm Surveillance
# Use this on the broker laptop so other laptops can connect over LAN.

# Listen on all network interfaces (not just localhost)
listener 1883 0.0.0.0

# Keep setup simple for local trusted LAN use
allow_anonymous true

# Persistence (retained messages + clean restart behavior)
persistence true
persistence_location ./mosquitto-data/

# Logging
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
